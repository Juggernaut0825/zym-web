<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="50%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="#0a0a0a" stroke="url(#logoGradient)" stroke-width="3"/>

  <!-- Stylized Z -->
  <path d="M30 35 L90 35 L90 45 L50 75 L90 75 L90 85 L30 85 L30 75 L70 45 L30 45 Z"
        fill="url(#logoGradient)"
        filter="url(#glow)"/>

  <!-- Energy bolt through Z -->
  <path d="M75 30 L85 50 L78 50 L85 70 L75 50 L82 50 Z"
        fill="#fbbf24"
        opacity="0.9"/>

  <!-- Small accent dots -->
  <circle cx="25" cy="60" r="3" fill="#22c55e" opacity="0.6"/>
  <circle cx="95" cy="60" r="3" fill="#22c55e" opacity="0.6"/>

  <!-- Pulse rings -->
  <circle cx="60" cy="60" r="45" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.2"/>
</svg>

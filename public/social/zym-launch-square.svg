  <defs>
    <linearGradient id="brandGradientSquare" x1="182" y1="132" x2="985" y2="1036" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f28a3a"/>
      <stop offset="0.52" stop-color="#de7a35"/>
      <stop offset="1" stop-color="#6c7cf6"/>
    </linearGradient>
    <radialGradient id="bgGlowOrangeSquare" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(228 240) rotate(45.4) scale(392 298)">

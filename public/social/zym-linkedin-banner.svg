      <stop offset="0" stop-color="#f28a3a"/>
      <stop offset="0.52" stop-color="#de7a35"/>
      <stop offset="1" stop-color="#6c7cf6"/>
    </linearGradient>
    <radialGradient id="bgGlowOrangeBanner" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(214 86) rotate(42.3) scale(308 188)">

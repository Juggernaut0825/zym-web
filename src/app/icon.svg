<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f28a3a"/>
      <stop offset="52%" style="stop-color:#de7a35"/>
      <stop offset="100%" style="stop-color:#6c7cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="60" cy="60" r="55" fill="#0a0a0a" stroke="url(#logoGradient)" stroke-width="3"/>

  <path d="M30 35 L90 35 L90 45 L50 75 L90 75 L90 85 L30 85 L30 75 L70 45 L30 45 Z"
        fill="url(#logoGradient)"
        filter="url(#glow)"/>

  <path d="M75 30 L85 50 L78 50 L85 70 L75 50 L82 50 Z"
        fill="#fbbf24"
        opacity="0.9"/>

  <circle cx="25" cy="60" r="3" fill="#f28a3a" opacity="0.65"/>
  <circle cx="95" cy="60" r="3" fill="#6c7cf6" opacity="0.65"/>

  <circle cx="60" cy="60" r="45" fill="none" stroke="#f28a3a" stroke-width="1" opacity="0.28"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#6c7cf6" stroke-width="0.5" opacity="0.22"/>
</svg>
